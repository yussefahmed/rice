[colors]
background = #00000000
background-module = #FFFFFF
background-alt = #E0E0E0
foreground = #2D2D2D
primary = #555555
secondary = #81A1C1
alert = #BF616A
disabled = #A0A0A0

[bar/example]
width = 100%
height = 24pt
radius = 0
; dpi = 96
background = #00000000
foreground = ${colors.foreground}
line-size = 0
border-size = 0
border-color = #00000000
padding-left = 0
padding-right = 1
module-margin = 1
separator = 
separator-foreground = ${colors.disabled}
font-0 = "monospace;2"
font-1 = "FontAwesome:style=Regular:size=10;2"
font-2 = "Symbola:size=10;2"
modules-left = xworkspaces xwindow
modules-right = wlan battery volume
cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true
; tray-position = right
wm-restack = generic
override-redirect = true

[module/xworkspaces]
type = internal/xworkspaces
label-active = %name%
label-active-background = ${colors.background-alt}
label-active-padding = 1
label-occupied = %name%
label-occupied-background = ${colors.background-module}
label-occupied-padding = 1
label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1
label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-background = ${colors.background-module}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/filesystem]
type = internal/fs
interval = 25
mount-0 = /
format-mounted-background = ${colors.background-module}
format-mounted-padding = 1
label-mounted = %{F#a7c080}%mountpoint%%{F-} %percentage_used%%
label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/volume]
type = internal/pulseaudio
use-ui-max = true
interval = 2
format-volume = <ramp-volume> <label-volume>
format-volume-background = ${colors.background-module}
format-volume-padding = 1
label-volume = %percentage%%
label-volume-foreground = ${colors.primary}
format-muted = ÔÄ¶ <label-muted>
format-muted-background = ${colors.background-module}
format-muted-padding = 1
label-muted = muted
label-muted-foreground = ${colors.disabled}
ramp-volume-0 = ÔÄ¶
ramp-volume-1 = ÔÄß
ramp-volume-2 = ÔÄ®
ramp-volume-foreground = ${colors.primary}
click-left = gnome-control-center sound &
click-middle = wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle &
scroll-up = wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%+ &
scroll-down = wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%- &
click-right = pavucontrol &

[module/memory]
type = internal/memory
interval = 2
format-prefix = "RAM "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[module/gpu]
type = custom/script
exec = nvidia-smi --query-gpu=utilization.gpu --format=csv,noheader,nounits | awk '{ print $1 }'
interval = 2
format-prefix = "GPU "
format-prefix-foreground = ${colors.primary}
label = %output:2%%

[module/battery]
type = internal/battery
battery = BAT0
adapter = AC
full-at = 98

format-charging = <animation-charging> <label-charging>
format-charging-foreground = ${colors.primary}
format-charging-background = ${colors.background-module}
format-charging-padding = 1
label-charging = %percentage%%

format-discharging = <ramp-capacity> <label-discharging>
format-discharging-background = ${colors.background-module}
format-discharging-padding = 1
label-discharging = %percentage%%

format-full = <ramp-capacity> <label-full>
format-full-background = ${colors.background-module}
format-full-padding = 1
label-full = %percentage%%

ramp-capacity-0 = ÔČĄ
ramp-capacity-1 = ÔČÉ
ramp-capacity-2 = ÔČā
ramp-capacity-3 = ÔČĀ
ramp-capacity-4 = ÔČÄ
ramp-capacity-foreground = ${colors.primary}

animation-charging-0 = ÔÉß ÔČĄ
animation-charging-1 = ÔÉß ÔČÉ
animation-charging-2 = ÔÉß ÔČā
animation-charging-3 = ÔÉß ÔČĀ
animation-charging-4 = ÔÉß ÔČÄ
animation-charging-foreground = ${colors.primary}
animation-charging-framerate = 750

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-connected-background = ${colors.background-module}
format-connected-padding = 1
format-disconnected = <label-disconnected>
format-disconnected-background = ${colors.background-module}
format-disconnected-padding = 1
label-disconnected = %{F#a7c080}%ifname%%{F#7a8478} disconnected

[module/wlan]
inherit = network-base
interface-type = wireless
format-connected = Ôáę <ramp-signal> <label-connected>
format-connected-background = ${colors.background-module}
format-connected-padding = 1
label-connected = %essid%
label-connected-foreground = ${colors.primary}
label-disconnected = Ôáę offline
label-disconnected-foreground = ${colors.disabled}
ramp-signal-0 = ‚ĖĀ
ramp-signal-1 = ‚Ėā
ramp-signal-2 = ‚ĖÉ
ramp-signal-3 = ‚ĖĄ
ramp-signal-4 = ‚ĖÖ
ramp-signal-foreground = ${colors.primary}
click-left = gnome-control-center wifi &
click-middle = sh -c 'if [ "$(nmcli radio wifi)" = "enabled" ]; then nmcli radio wifi off; else nmcli radio wifi on; fi' &
click-right = nm-connection-editor &

[module/eth]
inherit = network-base
interface-type = wired
label-connected = %{F#a7c080}%{F-} %local_ip%
click-left = nm-connection-editor

[module/date]
type = internal/date
interval = 1
format-background = ${colors.background-module}
format-padding = 1
date = %H:%M
date-alt = %Y-%m-%d %H:%M:%S
label = %date%
label-foreground = ${colors.primary}

[settings]
screenchange-reload = true
pseudo-transparency = false
; vim:ft=dosini
